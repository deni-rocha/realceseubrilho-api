services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=realcestore # Nome do banco
      - POSTGRES_USER=frevolink # Usuário
      - POSTGRES_PASSWORD=flpassword # Senha
    ports:
      - '5432:5432' # Porta do host:porta do container
    volumes:
      - postgres_data:/var/lib/postgresql/data # Volume para persistência
    networks:
      - api-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U frevolink -d realcestore']
      interval: 5s
      timeout: 5s
      retries: 3
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    networks:
      - api-network
    environment:
    - DB_HOST=db
    - DB_PORT=5432
    - DB_USERNAME=frevolink
    - DB_PASSWORD=flpassword
    - DB_DATABASE=realcestore
    - JWT_SECRET=p0V1X2a8b$#nD!9LqTz@7RmF^YwK&3Jh
    - PORT=3000
    - NODE_ENV=production
    # Admin padrão
    - ADMIN_EMAIL=admin@realceseubrilho.com
    - ADMIN_PASSWORD=admin123
    - ADMIN_NAME=Administrador do Sistema
     # Configurações de Email
    - SMTP_HOST=smtp.gmail.com
    - SMTP_PORT=587
    - SMTP_USER=frevolink@gmail.com
    - SMTP_PASS=thgw nmyb dhen usrl
    - FRONTEND_URL=http://localhost:3000
    - SUPPORT_EMAIL=frevolink@gmail.com
volumes:
  postgres_data:
    # Define o volume nomeado

networks:
  #criação de network personalizada (permite conexão entre os containers por DNS)
  api-network:
